# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/vasudha-star/redrob-ranker"

sandbox_link: "https://colab.research.google.com/YOUR_LINK"
# ⚠️  Replace YOUR_LINK with your actual Colab notebook URL before submitting.
# The sandbox must demonstrate the current pipeline running on sample_candidates.json.

reproduce_command: >
  python precompute.py --candidates ./data/candidates.jsonl &&
  python rank.py --candidates ./data/candidates.jsonl --out ./submission.csv

# Notes on reproduction:
#   Step 1 — precompute.py (one-time, ~80 minutes on CPU):
#     Downloads and caches all-MiniLM-L6-v2 on first run if not already cached.
#     Saves data/candidate_embeddings.npy and data/candidate_ids.npy.
#     Only needs to be re-run if candidates.jsonl changes.
#   Step 2 — rank.py (~110 seconds):
#     Loads pre-computed embeddings, fits TF-IDF, scores all candidates,
#     applies Weighted RRF, generates reasoning, writes submission.csv.
#     No network access required — model reads from local cache.

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Local Windows machine / VS Code"
  cpu_cores: 4
  ram_gb: 8
  python_version: "3.12"
  os: "Windows 11"
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  pre_computation_required: true
  pre_computation_time_minutes: 80

# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Claude was used throughout development for architecture discussion, code
  review, debugging, and iterative design validation. All ranking logic,
  feature weights, honeypot detection rules, and design decisions were
  reviewed, tested, and approved by the participant before implementation.
  No candidate data was sent to any external API. The embedding model
  (all-MiniLM-L6-v2) runs fully locally with no external calls during
  ranking.

# ============================================================================
# Approach summary (≤200 words)
# ============================================================================
methodology_summary: |
  Three independent relevance signals are fused using weighted Reciprocal
  Rank Fusion (rule 0.50, embedding 0.30, TF-IDF 0.20, k=60).

  The rule engine computes 11 structured features from verified profile
  fields (title, company type, years of experience, platform assessment
  scores, location) and combines them with a behavioral availability
  multiplier (recency, recruiter response rate, interview completion) and
  a notice-period multiplier. Behavioral signals are multiplicative, not
  additive, because they measure hireability rather than technical fit.

  The embedding signal uses all-MiniLM-L6-v2 (sentence-transformers) to
  compute cosine similarity between each candidate's career narrative and
  a curated JD description. Candidate vectors are pre-computed offline
  (~80 minutes); ranking loads them from disk in ~2 seconds.

  The TF-IDF signal uses a sklearn TfidfVectorizer over career descriptions
  (not skills — skills are self-reported and unverified) for exact
  technical-term matching against the JD query.

  An 8-rule honeypot filter screens internally inconsistent profiles before
  any scoring: 32,111 of 100,000 candidates were flagged (inverted salary,
  impossible timelines, impossible skill durations) and excluded from all
  rankings. None appear in the submitted top 100.

  Ranking step completes in approximately two minutes on CPU with no
  network access after precomputation.

